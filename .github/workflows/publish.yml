name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  # How the job authenticates: npm exchanges this OIDC token with the registry,
  # which checks it against the trusted publisher configured on each package.
  # There is no npm token anywhere in this workflow.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Node 24 rather than the 22 CI uses: trusted publishing needs npm
      # >= 11.5.1 and Node >= 22.14, and Node 24 ships npm 11.16 while Node 22
      # still ships npm 10.9. tsdown allows >=24.11.0.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # A published version can never be replaced, so the gate runs before it,
      # not after.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Tagging v0.2.0 while a manifest still says 0.1.0 would publish the wrong
      # version under the right tag, and it cannot be undone.
      - name: Check the tag matches the manifests
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for pkg in core next; do
            version=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$version" != "$tag" ]; then
              echo "::error::packages/$pkg is $version but the tag says $tag"
              exit 1
            fi
          done
          echo "both packages are $tag"

      # Packed with pnpm and published with npm on purpose: only pnpm rewrites
      # the `workspace:` protocol in the manifest, so publishing straight from
      # the directory with npm would ship a literal `workspace:^` peer.
      #
      # No --provenance flag: trusted publishing attaches provenance on its own.
      # Core first, since @dayos/next declares a peer on it.
      - name: Publish
        run: |
          for pkg in core next; do
            name=$(node -p "require('./packages/$pkg/package.json').name")
            version=$(node -p "require('./packages/$pkg/package.json').version")

            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version is already on the registry, skipping"
              continue
            fi

            tarball=$(cd "packages/$pkg" && pnpm pack --pack-destination "$RUNNER_TEMP" | tail -1)
            npm publish "$tarball" --access public
            echo "published $name@$version"
          done
