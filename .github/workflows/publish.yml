name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  # Lets npm attach a signed provenance attestation tying the tarball to this
  # workflow run and commit.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # A missing secret otherwise surfaces as ENEEDAUTH at the very last step,
      # after the whole build has run. Drop this check when moving to trusted
      # publishing, which authenticates without a token.
      - name: Check the token is present
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN is not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      # Node 24 rather than the 22 CI uses: it ships npm 11, and trusted
      # publishing over OIDC needs npm >= 11.5.1, while Node 22 still ships
      # npm 10.9. Provenance would work on either. tsdown allows >=24.11.0.
      #
      # `registry-url` is what makes npm read NODE_AUTH_TOKEN when publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # A published version can never be replaced, so the gate runs before it,
      # not after.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Tagging v0.2.0 while a manifest still says 0.1.0 would publish the wrong
      # version under the right tag, and it cannot be undone.
      - name: Check the tag matches the manifests
        run: |
          tag="${GITHUB_REF_NAME#v}"
          for pkg in core next; do
            version=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$version" != "$tag" ]; then
              echo "::error::packages/$pkg is $version but the tag says $tag"
              exit 1
            fi
          done
          echo "both packages are $tag"

      # Packed with pnpm and published with npm on purpose: only pnpm rewrites
      # the `workspace:` protocol in the manifest, and only npm can attach
      # provenance. Core first, since @dayos/next declares a peer on it.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in core next; do
            name=$(node -p "require('./packages/$pkg/package.json').name")
            version=$(node -p "require('./packages/$pkg/package.json').version")

            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version is already on the registry, skipping"
              continue
            fi

            tarball=$(cd "packages/$pkg" && pnpm pack --pack-destination "$RUNNER_TEMP" | tail -1)
            npm publish "$tarball" --provenance --access public
            echo "published $name@$version"
          done
